<div class="perfil">
  <div class="perfil-card">
    <h1>Mi Perfil</h1>

    <div *ngIf="mensaje()" class="msg" [class.msg-exito]="esExito()">{{ mensaje() }}</div>
    <div *ngIf="error()" class="msg msg-error">{{ error() }}</div>

    <!-- Avatar -->
    <div class="avatar-section">
      <div class="avatar-wrap">
        <img
          [src]="avatarUrl() || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2280%22 height=%2280%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23D1D5DB%22 stroke-width=%221%22%3E%3Ccircle cx=%2212%22 cy=%228%22 r=%224%22/%3E%3Cpath d=%22M4 20c0-4 3.6-7 8-7s8 3 8 7%22/%3E%3C/svg%3E'"
          alt="Avatar"
          class="avatar-img"
        />
        <label class="avatar-upload" [class.loading]="subiendoAvatar()">
          <input
            type="file"
            accept="image/*"
            (change)="onAvatarSelected($event)"
            [disabled]="subiendoAvatar()"
          />
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
        </label>
      </div>
      <p class="avatar-hint" *ngIf="!subiendoAvatar()">Toca la cámara para cambiar foto</p>
      <p class="avatar-hint" *ngIf="subiendoAvatar()">Subiendo...</p>
    </div>

    <div class="field">
      <label>Email</label>
      <p class="field-readonly">{{ email }}</p>
    </div>

    <div class="field">
      <label for="nombre">Nombre</label>
      <input
        id="nombre"
        type="text"
        [(ngModel)]="nombre"
        placeholder="Tu nombre"
        (keyup.enter)="guardarNombre()"
      />
    </div>

    <button class="btn-primary" (click)="guardarNombre()" [disabled]="guardandoNombre() || !nombre.trim()">
      {{ guardandoNombre() ? 'Guardando...' : 'Guardar nombre' }}
    </button>

    <hr class="divider" />

    <h2>Cambiar contraseña</h2>

    <div class="field">
      <label for="new-password">Nueva contraseña</label>
      <input
        id="new-password"
        type="password"
        [(ngModel)]="newPassword"
        placeholder="Mínimo 6 caracteres"
      />
    </div>

    <div class="field">
      <label for="confirm-new-password">Confirmar contraseña</label>
      <input
        id="confirm-new-password"
        type="password"
        [(ngModel)]="confirmNewPassword"
        placeholder="Repite la contraseña"
      />
    </div>

    <button class="btn-primary" (click)="cambiarPassword()" [disabled]="cambiandoPassword()">
      {{ cambiandoPassword() ? 'Cambiando...' : 'Cambiar contraseña' }}
    </button>
  </div>
</div>
