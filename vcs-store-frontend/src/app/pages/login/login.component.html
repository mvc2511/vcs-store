<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>{{ esRegistro() ? 'Crear Cuenta' : 'Iniciar Sesión' }}</h1>
      <p class="login-subtitle">
        {{ esRegistro() ? 'Únete a nuestra comunidad VYRO' : 'Bienvenido de vuelta' }}
      </p>
    </div>

    <div *ngIf="error()" class="alert" [class.alert-error]="!error().includes('enviamos')" [class.alert-success]="error().includes('enviamos')" role="alert" aria-live="polite">
      <svg *ngIf="error().includes('enviamos')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <svg *ngIf="!error().includes('enviamos')" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error() }}
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      <div *ngIf="esRegistro()" class="form-group">
        <label for="nombre">Nombre completo</label>
        <input
          id="nombre"
          type="text"
          [(ngModel)]="nombre"
          name="nombre"
          placeholder="Tu nombre"
          required
          autocomplete="name"
          class="input-field"
        />
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@correo.com"
          required
          autocomplete="email"
          class="input-field"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
          class="input-field"
        />
        <div *ngIf="esRegistro() && password" class="password-strength">
          <div class="strength-bar">
            <div class="strength-fill" [style.width.%]="getPasswordStrength().level * 25" [style.background-color]="getPasswordStrength().color"></div>
          </div>
          <span class="strength-label" [style.color]="getPasswordStrength().color">
            {{ getPasswordStrength().label }}
          </span>
        </div>
      </div>

      <div *ngIf="esRegistro()" class="form-group">
        <label for="confirm-password">Confirmar contraseña</label>
        <input
          id="confirm-password"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="••••••••"
          required
          autocomplete="new-password"
          class="input-field"
        />
      </div>

      <div *ngIf="esRegistro()" class="form-group terms-group">
        <label class="terms-label">
          <input
            type="checkbox"
            [(ngModel)]="aceptaTerminos"
            name="aceptaTerminos"
          />
          <span>Acepto los <a routerLink="/terminos" class="link" target="_blank">términos y condiciones</a></span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading()">
        <span *ngIf="loading()" class="btn-loader"></span>
        {{ loading() ? 'Procesando...' : esRegistro() ? 'Crear Cuenta' : 'Entrar' }}
      </button>
    </form>

    <div class="login-divider">
      <span>o continúa con</span>
    </div>

    <button class="btn-google" (click)="onGoogleLogin()" aria-label="Iniciar sesión con Google">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
        <path fill="#FF3D00" d="m6.306 14.691 6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
        <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
        <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
      </svg>
      Continuar con Google
    </button>

    <p class="login-toggle">
      {{ esRegistro() ? '¿Ya tienes cuenta?' : '¿No tienes cuenta?' }}
      <button type="button" class="link-btn" (click)="toggleModo()">
        {{ esRegistro() ? 'Inicia sesión' : 'Regístrate' }}
      </button>
    </p>
  </div>
</div>
