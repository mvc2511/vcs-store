<div class="detail">
  <div class="detail-container">
    <a routerLink="/" class="back-link">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Volver al catálogo
    </a>

    <div *ngIf="loading" class="loading">
      <div class="loader"></div>
    </div>

    <div *ngIf="!loading && producto() as p" class="detail-content">
      <div class="detail-gallery">
        <img [src]="p.imagen_url" [alt]="p.nombre" class="detail-image" loading="lazy" />
      </div>
      <div class="detail-info">
        <span class="detail-category">{{ p.categoria }}</span>
        <h1 class="detail-name">{{ p.nombre }}</h1>

        <div class="detail-price-row">
          <span class="detail-price">{{ precioActual() | currency:'MXN':'symbol-narrow':'1.0-0' }}</span>
          <span class="detail-stock" [class]="'detail-stock ' + stockClass()">
            {{ stockText() }}
          </span>
        </div>

        <p class="detail-description">{{ p.descripcion }}</p>

        <!-- Variant selectors -->
        <div *ngIf="hasVariants()" class="variants-section">
          <div *ngIf="hasTalla()" class="selector-group">
            <label class="selector-label">Talla</label>
            <div class="variant-pills">
              <button
                *ngFor="let talla of uniqueTallas()"
                class="variant-pill"
                [class.active]="selectedTalla() === talla"
                (click)="selectTalla(talla)"
              >
                {{ talla }}
              </button>
            </div>
          </div>

          <div *ngIf="hasColor()" class="selector-group">
            <label class="selector-label">Color</label>
            <div class="variant-pills">
              <button
                *ngFor="let color of uniqueColores()"
                class="variant-pill"
                [class.active]="selectedColor() === color"
                (click)="selectColor(color)"
              >
                {{ color }}
              </button>
            </div>
          </div>
        </div>

        <div class="selector-group">
          <label class="selector-label">Cantidad</label>
          <div class="cantidad-control">
            <button (click)="cantidad.set(Math.max(1, cantidad() - 1))" aria-label="Reducir cantidad">-</button>
            <span>{{ cantidad() }}</span>
            <button (click)="cantidad.set(cantidad() + 1)" aria-label="Aumentar cantidad">+</button>
          </div>
        </div>

        <button
          class="add-btn"
          (click)="addToCart()"
          [disabled]="!canAddToCart()"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Agregar al carrito
        </button>
      </div>
    </div>
  </div>
</div>
