<div class="success">
  <div class="success-card">
    <div class="success-icon" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 class="success-title">¡Pedido Registrado!</h1>
    <p class="success-sub">
      <ng-container *ngIf="esCOD; else pagoMsg">
        Tu pedido está en proceso. Pagarás contra entrega cuando recibas tus productos. Te contactaremos para coordinar la entrega.
      </ng-container>
      <ng-template #pagoMsg>
        Gracias por tu compra. Recibirás un correo con los detalles de tu pedido.
      </ng-template>
    </p>
    <a routerLink="/" class="success-btn">Seguir comprando</a>
  </div>
</div>
