<div class="sobre-pedido-page">
  <section class="sobre-pedido-hero">
    <div class="sobre-pedido-hero-visual">
      <div class="sobre-pedido-hero-shape"></div>
      <div class="sobre-pedido-hero-shape sobre-pedido-hero-shape-2"></div>
      <div class="sobre-pedido-hero-shape sobre-pedido-hero-shape-3"></div>
    </div>

    <div class="sobre-pedido-hero-inner">
      <div class="sobre-pedido-hero-header">
        <span class="sobre-pedido-hero-tag">✦ Catálogo Exclusivo</span>
        <h1 class="sobre-pedido-hero-title">Perfumes<br /><span class="sobre-pedido-hero-accent">Sobre Pedido</span>
        </h1>
        <p class="sobre-pedido-hero-subtitle">
          Fragancias sobre pedido, especialmente para ti.<br />
          Entrega los fines de semana en tu punto de entrega.
        </p>
        <a [href]="whatsappLink" target="_blank" rel="noopener" class="sobre-pedido-hero-wa">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path
              d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
          </svg>
          Consultar todo por WhatsApp
        </a>
      </div>
    </div>

    <div class="sobre-pedido-hero-grid-wrap">
      <div class="sobre-pedido-bar">
        <div class="sobre-pedido-bar-search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" [(ngModel)]="searchQuery" (ngModelChange)="onSearchChange()"
            placeholder="Buscar en catálogo..." aria-label="Buscar en perfumes sobre pedido" />
        </div>
      </div>

      <div *ngIf="!loading && filteredProductos.length === 0" class="sobre-pedido-empty">
        <p>No encontramos fragancias con esos criterios. <a [href]="whatsappLink" target="_blank"
            rel="noopener">Consulta por WhatsApp</a></p>
      </div>

      <div *ngIf="loading" class="sobre-pedido-loading">
        <div class="sobre-pedido-skeleton-grid">
          <div *ngFor="let _ of [1,2,3,4]" class="sobre-pedido-skeleton-card">
            <div class="sobre-pedido-skeleton-img"></div>
            <div class="sobre-pedido-skeleton-body">
              <div class="sobre-pedido-skeleton-line w-40"></div>
              <div class="sobre-pedido-skeleton-line w-60"></div>
            </div>
          </div>
        </div>
      </div>

      <div *ngIf="!loading && filteredProductos.length > 0" class="sobre-pedido-grid">
        <app-product-card *ngFor="let p of filteredProductos; let i = index" [producto]="p"
          [attr.style]="'animation-delay: ' + (i * 0.03) + 's'" />

        <div class="sobre-pedido-more-card">
          <a [href]="whatsappLink" target="_blank" rel="noopener">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
            </svg>
            <span>¿No encuentras tu fragancia?<br />Pregunta por WhatsApp</span>
          </a>
        </div>
      </div>
    </div>
  </section>
</div>
