<div class="favoritos-page">
  <div class="favoritos-container">
    <h1 class="favoritos-title">TUS FAVORITOS</h1>

    <div *ngIf="wishlistService.wishlistItems().length === 0" class="favoritos-empty">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </div>
      <h2 class="empty-title">No tienes favoritos aún</h2>
      <p class="empty-text">Explora el catálogo y agrega tus prendas favoritas.</p>
      <a routerLink="/" class="empty-btn">Ir al catálogo</a>
    </div>

    <div *ngIf="wishlistService.wishlistItems().length > 0" class="favoritos-grid">
      <app-product-card *ngFor="let producto of wishlistService.wishlistItems()" [producto]="producto" />
    </div>
  </div>
</div>
