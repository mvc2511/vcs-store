<div class="home">
  <!-- ═════════════════════════════════════════════════════
       HERO SECTION — Editorial Minimalista
       ═════════════════════════════════════════════════════ -->
  <section class="hero">
    <div class="hero-inner">
      <div class="hero-content">
        <div class="hero-badge">Nuevas colecciones</div>
        <h1 class="hero-title">
          Urban<br/><span class="hero-accent">Curation</span>
        </h1>
        <p class="hero-subtitle">
          Streetwear contemporáneo y perfumería niche para quien entiende el estilo.
        </p>
        <a href="#catalogo" class="btn btn-primary btn-lg">Explorar colección</a>
      </div>

      <div class="hero-visual">
        <div class="hero-shape"></div>
        <div class="hero-shape hero-shape-2"></div>
        <div class="hero-shape hero-shape-3"></div>
      </div>
    </div>
  </section>

  <!-- ═════════════════════════════════════════════════════
       CATÁLOGO SECTION — Grid Editorial
       ═════════════════════════════════════════════════════ -->
  <section id="catalogo" class="catalogo">
    <div class="catalogo-header">
      <div class="header-left">
        <h2 class="catalogo-title">{{ selectedCategoria || 'Todas las colecciones' }}</h2>
        <p class="catalogo-subtitle" *ngIf="!loading">
          {{ total }} productos disponibles
        </p>
      </div>
    </div>

    <!-- Filter & Sort Bar (Sticky) -->
    <div class="filter-bar-sticky">
      <div class="filter-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          placeholder="Buscar en colección..."
          [(ngModel)]="searchQuery"
          (ngModelChange)="onSearchChange()"
          aria-label="Buscar productos"
        />
      </div>
      <div class="filter-bar-inner">
        <div class="categoria-chips">
          <button
            *ngFor="let cat of categorias"
            class="chip"
            [class.chip-active]="selectedCategoria === cat.nombre"
            (click)="filterBy(cat)"
            [attr.aria-pressed]="selectedCategoria === cat.nombre"
          >
            {{ cat.nombre }}
          </button>
          <button
            *ngIf="selectedCategoria"
            class="chip chip-clear"
            (click)="selectedCategoria = ''; selectedCategoriaId = null; cargarProductos(true)"
            aria-label="Limpiar filtro"
          >
            ✕ Limpiar
          </button>
        </div>

        <select [(ngModel)]="sortOrder" (ngModelChange)="onSortChange()" class="sort-select" aria-label="Ordenar productos">
          <option value="">Más recientes</option>
          <option value="price-asc">Precio: menor a mayor</option>
          <option value="price-desc">Precio: mayor a menor</option>
        </select>
      </div>
    </div>

    <!-- Loading State — Skeleton Grid -->
    <div *ngIf="loading" class="loading-state">
      <div class="skeleton-grid">
        <div *ngFor="let _ of [1,2,3,4,5,6,7,8]" class="skeleton-card">
          <div class="skeleton-img"></div>
          <div class="skeleton-body">
            <div class="skeleton-line skeleton-cat"></div>
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-price"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && productos.length === 0" class="empty-state">
      <div class="empty-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <h3 class="empty-title">No hay productos</h3>
      <p class="empty-text">No encontramos productos que coincidan con tu búsqueda.</p>
      <button (click)="selectedCategoria = ''; selectedCategoriaId = null; searchQuery = ''; cargarProductos(true)" class="btn btn-secondary">
        Limpiar filtros
      </button>
    </div>

    <!-- Productos Grid — Responsive 4-3-2-1 -->
    <div *ngIf="!loading && productos.length > 0" class="productos-grid">
      <app-product-card
        *ngFor="let p of productos; let i = index"
        [producto]="p"
        [attr.style]="'animation-delay: ' + (i * 0.05) + 's'"
      />
    </div>

    <!-- Load More -->
    <div *ngIf="hasMore && !loading" class="load-more">
      <button class="btn btn-secondary" (click)="loadMore()" [disabled]="loadingMore">
        {{ loadingMore ? 'Cargando...' : 'Ver más productos' }}
      </button>
    </div>
  </section>
</div>
