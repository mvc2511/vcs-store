<nav class="navbar" aria-label="Navegación principal">
  <div class="navbar-inner">
    <!-- Logo VYRO Minimalista -->
    <a routerLink="/" class="navbar-brand" aria-label="VYRO - Tienda de moda urbana">
      <svg class="brand-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M4 4l8 16 8-16" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="8" y1="8" x2="16" y2="8" stroke-linecap="round"/>
      </svg>
      <span class="brand-text">VYRO</span>
    </a>

    <!-- Derecha: Links y acciones -->
    <div class="navbar-right">
      <!-- Links Desktop -->
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: true}"
        class="nav-link desktop-only"
        [attr.aria-current]="router.isActive('/', true) ? 'page' : null"
      >
        Catálogo
      </a>

      <a
        *ngIf="authService.perfil()?.rol === 'admin'"
        routerLink="/admin"
        routerLinkActive="active"
        class="nav-link admin-link desktop-only"
        [routerLinkActiveOptions]="{ exact: false }"
        [attr.aria-current]="router.url.startsWith('/admin') ? 'page' : null"
      >
        Admin
      </a>

      <a
        *ngIf="authService.isLoggedIn()"
        routerLink="/favoritos"
        routerLinkActive="active"
        class="nav-link desktop-only"
        [attr.aria-current]="router.isActive('/favoritos', true) ? 'page' : null"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-right: 4px; vertical-align: -2px;">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Favoritos
      </a>

      <a
        *ngIf="authService.isLoggedIn()"
        routerLink="/mis-pedidos"
        routerLinkActive="active"
        class="nav-link desktop-only"
        [attr.aria-current]="router.isActive('/mis-pedidos', true) ? 'page' : null"
      >
        Mis Pedidos
      </a>

      <a
        *ngIf="authService.isLoggedIn()"
        routerLink="/perfil"
        routerLinkActive="active"
        class="nav-link desktop-only"
        [attr.aria-current]="router.url === '/perfil' ? 'page' : null"
      >
        Mi Perfil
      </a>

      <!-- Carrito -->
      <a 
        routerLink="/cart" 
        routerLinkActive="active" 
        class="nav-icon cart-link" 
        aria-label="Carrito de compras" 
        [attr.aria-current]="router.isActive('/cart', false) ? 'page' : null"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="21" r="1"/>
          <circle cx="20" cy="21" r="1"/>
          <path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span *ngIf="cartService.totalItems() > 0" class="cart-badge" aria-hidden="true">
          {{ cartService.totalItems() }}
        </span>
      </a>

      <!-- Auth Section Desktop -->
      <div class="auth-section desktop-only">
        <ng-container *ngIf="!authService.isLoggedIn()">
          <a routerLink="/login" class="login-btn">
            Entrar
          </a>
        </ng-container>
        <div class="user-section" *ngIf="authService.user() as user">
          <a routerLink="/perfil" class="user-avatar-link" aria-label="Ir a mi perfil">
            <img 
              [src]="user.user_metadata['avatar_url'] || ''" 
              alt="Avatar de usuario" 
              class="user-avatar" 
              loading="lazy" 
              referrerpolicy="no-referrer" 
            />
          </a>
          <a routerLink="/perfil" class="user-name-link"><span class="user-name">{{ user.user_metadata['full_name'] || user.email }}</span></a>
          <button class="logout-btn" (click)="handleLogout()" aria-label="Cerrar sesión" title="Cerrar sesión">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Hamburger Mobile -->
      <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Abrir menú de navegación">
        <span class="hamburger-line" [class.open]="menuOpen()"></span>
        <span class="hamburger-line" [class.open]="menuOpen()"></span>
        <span class="hamburger-line" [class.open]="menuOpen()"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div class="mobile-menu" [class.open]="menuOpen()" *ngIf="menuOpen()">
    <div class="mobile-menu-inner">
      <!-- Links Mobile -->
      <a routerLink="/" class="mob-link" (click)="closeMenu()">Catálogo</a>
      <a *ngIf="authService.perfil()?.rol === 'admin'" routerLink="/admin" class="mob-link" (click)="closeMenu()">Admin</a>
      <a *ngIf="authService.isLoggedIn()" routerLink="/favoritos" class="mob-link" (click)="closeMenu()">Favoritos</a>
      <a *ngIf="authService.isLoggedIn()" routerLink="/mis-pedidos" class="mob-link" (click)="closeMenu()">Mis Pedidos</a>
      <a *ngIf="authService.isLoggedIn()" routerLink="/perfil" class="mob-link" (click)="closeMenu()">Mi Perfil</a>

      <!-- Auth Mobile -->
      <div class="mob-auth" *ngIf="!authService.isLoggedIn()">
        <a routerLink="/login" class="mob-link mob-login" (click)="closeMenu()">Entrar</a>
      </div>

      <div class="mob-auth" *ngIf="authService.user() as user">
        <span class="mob-user">
          <img [src]="user.user_metadata['avatar_url']" alt="" class="mob-avatar" loading="lazy" />
          {{ user.user_metadata['full_name'] || user.email }}
        </span>
        <button class="mob-logout" (click)="handleLogout(); closeMenu()">Cerrar sesión</button>
      </div>
    </div>
  </div>
</nav>
