<nav class="navbar">
  <div class="navbar-inner">
    <a routerLink="/" class="navbar-brand">
      <span class="brand-icon">&#10003;</span>
      <span class="brand-text">VCS</span>
      <span class="brand-accent">Store</span>
    </a>
    <div class="navbar-right">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: true}"
        class="nav-link"
      >
        Catálogo
      </a>
      <a routerLink="/cart" routerLinkActive="active" class="nav-link cart-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span *ngIf="cartService.totalItems() > 0" class="cart-badge">
          {{ cartService.totalItems() }}
        </span>
      </a>

      <a
        *ngIf="authService.perfil()?.rol === 'admin'"
        routerLink="/admin/productos/nuevo"
        routerLinkActive="active"
        class="nav-link admin-link"
      >
        + Producto
      </a>
      <a
        *ngIf="authService.perfil()?.rol === 'admin'"
        routerLink="/admin/categorias"
        routerLinkActive="active"
        class="nav-link admin-link"
      >
        Categorías
      </a>

      <div *ngIf="!authService.isLoggedIn()" class="auth-section">
        <a routerLink="/login" class="login-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          Entrar
        </a>
      </div>

      <div *ngIf="authService.user() as user" class="user-section">
        <img
          [src]="user.user_metadata['avatar_url']"
          [alt]="user.user_metadata['full_name']"
          class="user-avatar"
        />
        <span class="user-name">{{ user.user_metadata['full_name'] }}</span>
        <button class="logout-btn" (click)="authService.logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</nav>
