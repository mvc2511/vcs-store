<nav class="navbar" aria-label="Navegación principal">
  <div class="navbar-inner">
    <a routerLink="/" class="navbar-brand" aria-label="VC'S Store - Inicio">
      <span class="brand-icon" aria-hidden="true">&#10003;</span>
      <span class="brand-text">VCS</span>
      <span class="brand-accent">Store</span>
    </a>

    <div class="navbar-right">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{exact: true}"
        class="nav-link desktop-only"
        [attr.aria-current]="router.isActive('/' , true) ? 'page' : null"
      >
        Catálogo
      </a>

      <a
        *ngIf="authService.perfil()?.rol === 'admin'"
        routerLink="/admin"
        routerLinkActive="active"
        class="nav-link admin-link desktop-only"
        [routerLinkActiveOptions]="{ exact: false }"
        [attr.aria-current]="router.url.startsWith('/admin') ? 'page' : null"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        Admin
      </a>

      <a routerLink="/cart" routerLinkActive="active" class="nav-link cart-link" aria-label="Carrito de compras" [attr.aria-current]="router.isActive('/cart', false) ? 'page' : null">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="m1 1 4 0 2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span *ngIf="cartService.totalItems() > 0" class="cart-badge" aria-hidden="true">
          {{ cartService.totalItems() }}
        </span>
      </a>

      <div class="auth-section desktop-only">
        <ng-container *ngIf="!authService.isLoggedIn()">
          <a routerLink="/login" class="login-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
            </svg>
            Entrar
          </a>
        </ng-container>
        <div class="user-section" *ngIf="authService.user() as user">
          <img [src]="user.user_metadata['avatar_url'] || ''" alt="" class="user-avatar" loading="lazy" referrerpolicy="no-referrer" />
          <span class="user-name">{{ user.user_metadata['full_name'] || user.email }}</span>
          <button class="logout-btn" (click)="authService.logout()" aria-label="Cerrar sesión">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="menuOpen()" aria-label="Abrir menú">
        <span class="hamburger-line" [class.open]="menuOpen()"></span>
        <span class="hamburger-line" [class.open]="menuOpen()"></span>
        <span class="hamburger-line" [class.open]="menuOpen()"></span>
      </button>
    </div>
  </div>

  <div class="mobile-menu" [class.open]="menuOpen()" *ngIf="menuOpen()">
    <a routerLink="/" class="mob-link" (click)="closeMenu()">Catálogo</a>
    <a *ngIf="authService.perfil()?.rol === 'admin'" routerLink="/admin" class="mob-link" (click)="closeMenu()">Admin</a>

    <div class="mob-auth" *ngIf="!authService.isLoggedIn()">
      <a routerLink="/login" class="mob-link" (click)="closeMenu()">Entrar</a>
    </div>

    <div class="mob-auth" *ngIf="authService.user() as user">
      <span class="mob-user">
        <img [src]="user.user_metadata['avatar_url']" alt="" class="mob-avatar" loading="lazy" />
        {{ user.user_metadata['full_name'] }}
      </span>
      <button class="mob-logout" (click)="authService.logout(); closeMenu()">Cerrar sesión</button>
    </div>
  </div>
</nav>
