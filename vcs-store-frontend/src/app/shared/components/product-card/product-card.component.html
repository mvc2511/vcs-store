<div class="card">
  <a [routerLink]="['/producto', producto().id]" class="card-image-wrap" [style.--img-url]="'url(' + producto().imagen_url + ')'">
    <div class="card-image-bg"></div>
    <img
      [src]="producto().imagen_url"
      [alt]="producto().nombre"
      class="card-image"
      loading="lazy"
    />
    <span *ngIf="(producto().stock_real ?? producto().stock) <= 5" class="stock-badge">
      {{ (producto().stock_real ?? producto().stock) === 0 ? 'Agotado' : 'Últimos ' + (producto().stock_real ?? producto().stock) }}
    </span>
  </a>
  <div class="card-body">
    <span class="card-category">{{ producto().categoria }}</span>
    <h3 class="card-title">
      <a [routerLink]="['/producto', producto().id]">{{ producto().nombre }}</a>
    </h3>
    <div class="card-footer">
      <span class="card-price">{{ producto().precio | currency:'MXN':'symbol-narrow':'1.0-0' }}</span>
      <button
        class="card-btn"
        (click)="addToCart()"
        [disabled]="(producto().stock_real ?? producto().stock) === 0"
        [title]="(producto().stock_real ?? producto().stock) === 0 ? 'Agotado' : (producto().has_variants ? 'Seleccionar variante' : 'Agregar al carrito')"
        aria-label="Agregar al carrito"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
  </div>
</div>
