services:

  backend:
    build:
      context: ./vcs-store-backend
    container_name: vcs-backend
    ports:
      - "8000:8000"
    env_file:
      - ./vcs-store-backend/.env
    restart: unless-stopped
    networks:
      - vcs-network

  frontend:
    build:
      context: ./vcs-store-frontend
    container_name: vcs-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vcs-network

networks:
  vcs-network:
    driver: bridge
