<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VYRO — Product Promo</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; overflow: hidden; }
  </style>
</head>
<body>
  <div
    data-composition-id="vyro-product-promo"
    data-width="1080"
    data-height="1920"
    style="width:1080px;height:1920px;background:#F5F5F2;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;padding:80px 40px;"
  >
    <!-- Background shape -->
    <div
      data-start="0"
      data-duration="8"
      style="position:absolute;width:500px;height:500px;border-radius:50%;background:#C6A969;opacity:0.06;top:-120px;right:-80px;filter:blur(80px);"
    ></div>

    <!-- VYRO badge -->
    <div
      data-start="0"
      data-duration="0.6"
      style="opacity:0;margin-top:40px;"
    >
      <span style="display:inline-block;padding:8px 20px;background:#C6A969;border-radius:999px;font-size:13px;font-weight:700;color:#111111;letter-spacing:0.15em;text-transform:uppercase;">
        Nueva Colección
      </span>
    </div>

    <!-- Product image placeholder -->
    <div
      data-start="0.8"
      data-duration="0.8"
      style="width:400px;height:500px;border-radius:20px;background:#E8E6DF;margin-top:60px;opacity:0;display:flex;align-items:center;justify-content:center;overflow:hidden;"
    >
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#BFC3C9" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>

    <!-- Product name -->
    <div
      data-start="1.8"
      data-duration="0.5"
      style="margin-top:40px;opacity:0;"
    >
      <h2 style="font-size:32px;font-weight:700;color:#111111;text-align:center;line-height:1.2;">
        Prenda Exclusiva
      </h2>
    </div>

    <!-- Category -->
    <div
      data-start="2.4"
      data-duration="0.4"
      style="margin-top:12px;opacity:0;"
    >
      <span style="font-size:13px;font-weight:600;color:#C6A969;letter-spacing:0.12em;text-transform:uppercase;">
        Categoría · Streetwear
      </span>
    </div>

    <!-- Price -->
    <div
      data-start="3"
      data-duration="0.5"
      style="margin-top:24px;opacity:0;"
    >
      <span style="font-size:40px;font-weight:700;color:#111111;">
        $899 MXN
      </span>
    </div>

    <!-- CTA button -->
    <div
      data-start="4"
      data-duration="0.6"
      style="margin-top:50px;opacity:0;"
    >
      <span style="display:inline-block;padding:16px 48px;background:#111111;color:#F5F5F2;border-radius:999px;font-size:18px;font-weight:600;letter-spacing:0.04em;">
        Comprar Ahora
      </span>
    </div>

    <!-- Footer tag -->
    <div
      data-start="6"
      data-duration="2"
      style="position:absolute;bottom:60px;opacity:0;"
    >
      <p style="font-size:14px;color:#BFC3C9;letter-spacing:0.08em;">
        vyro.boutique
      </p>
    </div>
  </div>
</body>
</html>
