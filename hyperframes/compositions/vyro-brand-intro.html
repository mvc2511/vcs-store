<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VYRO — Brand Intro</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Satoshi', sans-serif; overflow: hidden; }
  </style>
</head>
<body>
  <div
    data-composition-id="vyro-brand-intro"
    data-width="1920"
    data-height="1080"
    style="width:1920px;height:1080px;background:#F5F5F2;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;"
  >
    <!-- Background shapes -->
    <div
      data-start="0"
      data-duration="6"
      style="position:absolute;width:600px;height:600px;border-radius:50%;background:#C6A969;opacity:0.08;top:-150px;right:-100px;filter:blur(80px);"
    ></div>
    <div
      data-start="0"
      data-duration="6"
      style="position:absolute;width:400px;height:400px;border-radius:50%;background:#C6A969;opacity:0.06;bottom:-80px;left:-80px;filter:blur(60px);"
    ></div>

    <!-- Brand line (animated underline) -->
    <div
      data-start="0.5"
      data-duration="1.2"
      style="position:absolute;top:50%;left:50%;transform:translate(-50%,-80px);width:0;height:2px;background:#C6A969;"
    ></div>

    <!-- VYRO wordmark -->
    <div
      data-start="1.8"
      data-duration="0.8"
      style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0;"
    >
      <h1 style="font-size:120px;font-weight:700;letter-spacing:0.08em;color:#111111;text-transform:uppercase;line-height:1;margin:0;">
        VYRO
      </h1>
    </div>

    <!-- Tagline -->
    <div
      data-start="2.8"
      data-duration="0.6"
      style="position:absolute;top:50%;left:50%;transform:translate(-50%,40px);opacity:0;"
    >
      <p style="font-size:22px;font-weight:400;letter-spacing:0.15em;color:#BFC3C9;text-transform:uppercase;margin:0;">
        Moda Urbana · Estilo Único
      </p>
    </div>

    <!-- CTA -->
    <div
      data-start="4"
      data-duration="2"
      style="position:absolute;bottom:120px;left:50%;transform:translateX(-50%);opacity:0;"
    >
      <span style="display:inline-block;padding:14px 40px;border:2px solid #111111;border-radius:999px;font-size:16px;font-weight:600;color:#111111;letter-spacing:0.04em;">
        vyro.boutique
      </span>
    </div>
  </div>
</body>
</html>
